name: generate ascii artwork build test deploy

on: push

jobs:
    build_job_1:
        runs-on: ubuntu-latest       
        steps:
        - name: install cowsay
          run: sudo apt-get install -y cowsay

        - name: create dragon ascii art
          run: cowsay -f dragon "dragon ASCIIDOC file generated" > dragon.txt

        - name: Upload dragon ascii file
          uses: actions/upload-artifact@v4
          with:
            name: dragon-file
            path: dragon.txt

    test_job_1:
        needs: build_job_1
        runs-on: ubuntu-latest       
        steps:
        - name: Download dragon ascii file
          uses: actions/download-artifact@v4
          with:
            name: dragon-file
            

        - name: test file exist
          run: grep -i "dragon" dragon.txt


    deploy_job_1:
        needs: test_job_1
        runs-on: ubuntu-latest       
        steps:
        - name: Download dragon ascii file
          uses: actions/download-artifact@v4
          with:
            name: dragon-file
            

        - name: read file 
          run: cat dragon.txt
          
        - name: deploy file
          run: echo "Deploying ASCII art..."    